name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile=false

      - name: Compilar shared
        run: pnpm --filter @agenda-medica/shared build

      - name: Verificar tipos del servidor
        run: pnpm --filter @agenda-medica/server lint

      - name: Verificar tipos del cliente
        run: pnpm --filter @agenda-medica/client lint

      - name: Build del cliente
        run: pnpm --filter @agenda-medica/client build
