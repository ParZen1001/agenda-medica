name: Release APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Nombre de la versión para el release (ej. v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile=false

      - name: Compilar paquete shared
        run: pnpm --filter @agenda-medica/shared build

      - name: Compilar el cliente web (Vite)
        run: pnpm --filter @agenda-medica/client build

      - name: Sincronizar assets web con Capacitor Android
        run: npx cap sync android
        working-directory: apps/client

      - name: Dar permisos de ejecución a gradlew
        run: chmod +x android/gradlew
        working-directory: apps/client

      - name: Instalar plataforma Android SDK requerida (API 36)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Compilar APK (debug, sin firmar)
        id: buildapk
        run: ./gradlew assembleDebug 2>&1 | tee /tmp/gradle.log
        working-directory: apps/client/android

      - name: Publicar diagnóstico si falló el build de Gradle
        if: failure() && steps.buildapk.outcome == 'failure'
        run: |
          BODY=$(tail -c 60000 /tmp/gradle.log | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": $BODY}"

      - name: Determinar nombre de la versión
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Renombrar APK
        run: |
          mkdir -p ../../release
          cp app/build/outputs/apk/debug/app-debug.apk ../../release/agenda-medica-${{ steps.version.outputs.tag }}.apk
        working-directory: apps/client/android

      - name: Publicar Release en GitHub con el APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Agenda Médica ${{ steps.version.outputs.tag }}"
          body: |
            Compilación automática del APK de Agenda Médica (build de depuración, sin firmar).

            Instalación: descarga el `.apk`, habilita "Instalar apps de orígenes desconocidos" en Android
            y ábrelo. Este APK apunta a la interfaz web empaquetada localmente; para conectarlo a un
            backend en producción, actualiza la URL de la API antes de compilar.
          files: release/agenda-medica-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: true
